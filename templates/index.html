<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cash Counter | Premium Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Hide number input spinners for a pristine UI */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        /* Smooth transition for theme switching */
        * { transition-property: background-color, border-color, color, fill, stroke; transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1); transition-duration: 300ms; }
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #334155; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-200 min-h-screen p-4 md:p-8 selection:bg-emerald-500 selection:text-white transition-colors duration-500">

    <div class="max-w-6xl mx-auto space-y-8">
        
        <header class="flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-3xl font-bold tracking-tight text-slate-900 dark:text-white flex items-center gap-3">
                    <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-emerald-500 to-teal-600 dark:from-emerald-400 dark:to-teal-600 shadow-lg shadow-emerald-500/20"></div>
                    Cash Counter
                </h1>
                <p class="text-slate-500 dark:text-slate-400 mt-1 text-sm tracking-wide uppercase font-semibold">Precision in Every Rupee</p>
            </div>
            
            <div class="flex items-center gap-3">
                <button onclick="toggleTheme()" class="p-2.5 bg-white dark:bg-white/5 hover:bg-slate-100 dark:hover:bg-white/10 border border-slate-200 dark:border-white/10 rounded-xl shadow-sm dark:shadow-none transition-all duration-300 backdrop-blur-md text-slate-600 dark:text-slate-300" aria-label="Toggle Theme">
                    <svg id="icon-sun" class="w-5 h-5 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                    <svg id="icon-moon" class="w-5 h-5 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                </button>

                <button onclick="resetCalculator()" class="px-6 py-2.5 bg-white dark:bg-white/5 hover:bg-slate-100 dark:hover:bg-white/10 border border-slate-200 dark:border-white/10 rounded-xl shadow-sm dark:shadow-none transition-all duration-300 backdrop-blur-md text-sm font-semibold text-slate-700 dark:text-slate-300 hover:text-slate-900 dark:hover:text-white">
                    Reset Dashboard
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="md:col-span-1 bg-white dark:bg-gradient-to-br dark:from-slate-900 dark:to-slate-800 p-8 rounded-3xl border border-slate-200 dark:border-slate-700/50 shadow-xl shadow-slate-200/50 dark:shadow-2xl relative overflow-hidden">
                <div class="absolute top-0 right-0 w-32 h-32 bg-emerald-500/10 rounded-full blur-3xl -mr-10 -mt-10"></div>
                <p class="text-slate-500 dark:text-slate-400 text-sm font-medium mb-2">Grand Total</p>
                <div class="text-5xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-emerald-600 to-teal-500 dark:from-emerald-400 dark:to-teal-300">
                    ₹<span id="grand-total">0</span>
                </div>
            </div>

            <div class="md:col-span-2 grid grid-cols-1 sm:grid-cols-2 gap-6">
                <div class="bg-white/80 dark:bg-slate-900/50 p-8 rounded-3xl border border-slate-200 dark:border-slate-800 shadow-lg shadow-slate-200/40 dark:shadow-none backdrop-blur-xl flex flex-col justify-center">
                    <p class="text-slate-500 dark:text-slate-400 text-sm font-medium mb-2">Total Paper Notes</p>
                    <div class="text-4xl font-semibold text-slate-800 dark:text-white" id="total-notes">0</div>
                </div>
                <div class="bg-white/80 dark:bg-slate-900/50 p-8 rounded-3xl border border-slate-200 dark:border-slate-800 shadow-lg shadow-slate-200/40 dark:shadow-none backdrop-blur-xl flex flex-col justify-center">
                    <p class="text-slate-500 dark:text-slate-400 text-sm font-medium mb-2">Total Coins</p>
                    <div class="text-4xl font-semibold text-slate-800 dark:text-white" id="total-coins">0</div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            
            <div class="bg-white/60 dark:bg-slate-900/40 border border-slate-200 dark:border-slate-800 rounded-3xl p-6 md:p-8 backdrop-blur-md shadow-xl shadow-slate-200/40 dark:shadow-none">
                <div class="flex justify-between items-end mb-6 pb-4 border-b border-slate-200 dark:border-slate-800">
                    <h2 class="text-xl font-semibold text-slate-800 dark:text-white">Paper Notes</h2>
                    <span class="text-xs text-slate-400 dark:text-slate-500 font-medium tracking-wider uppercase">Quantity / Value</span>
                </div>
                <div class="space-y-3" id="notes-container">
                    </div>
            </div>

            <div class="bg-white/60 dark:bg-slate-900/40 border border-slate-200 dark:border-slate-800 rounded-3xl p-6 md:p-8 backdrop-blur-md shadow-xl shadow-slate-200/40 dark:shadow-none">
                <div class="flex justify-between items-end mb-6 pb-4 border-b border-slate-200 dark:border-slate-800">
                    <h2 class="text-xl font-semibold text-slate-800 dark:text-white">Coins</h2>
                    <span class="text-xs text-slate-400 dark:text-slate-500 font-medium tracking-wider uppercase">Quantity / Value</span>
                </div>
                <div class="space-y-3" id="coins-container">
                    </div>
            </div>

        </div>
    </div>

    <script>
        // --- Theme Management ---
        const html = document.documentElement;
        
        // Check for saved theme preference, otherwise default to dark mode for the premium feel
        if (localStorage.getItem('theme') === 'light') {
            html.classList.remove('dark');
        }

        function toggleTheme() {
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                localStorage.setItem('theme', 'light');
            } else {
                html.classList.add('dark');
                localStorage.setItem('theme', 'dark');
            }
        }

        // --- Calculator Logic ---
        const notes = [500, 200, 100, 50, 20, 10];
        const coins = [20, 10, 5, 2, 1];
        
        const grandTotalEl = document.getElementById('grand-total');
        const totalNotesEl = document.getElementById('total-notes');
        const totalCoinsEl = document.getElementById('total-coins');

        function buildUI(denominations, type, containerId) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            
            denominations.forEach(denom => {
                const row = document.createElement('div');
                // Added responsive classes for both modes
                row.className = "group flex items-center justify-between p-3 rounded-2xl hover:bg-slate-100/80 dark:hover:bg-white/[0.02] transition-colors border border-transparent dark:hover:border-white/5";
                
                row.innerHTML = `
                    <div class="flex items-center space-x-4 w-1/3">
                        <div class="bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-700 dark:text-slate-300 font-medium px-4 py-2 rounded-xl w-20 text-center shadow-inner">₹${denom}</div>
                        <span class="text-slate-400 dark:text-slate-600 text-sm">x</span>
                    </div>
                    <div class="w-1/3 px-4">
                        <input type="number" min="0" placeholder="0" 
                            class="w-full bg-white dark:bg-slate-950/50 border border-slate-300 dark:border-slate-800 rounded-xl px-4 py-2.5 text-slate-800 dark:text-white placeholder-slate-400 dark:placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-emerald-500/50 focus:border-emerald-500/50 transition-all text-center shadow-sm dark:shadow-none"
                            id="input-${type}-${denom}" oninput="calculate()">
                    </div>
                    <div class="w-1/3 text-right pr-2">
                        <span class="text-lg font-medium text-slate-600 dark:text-slate-300 group-hover:text-slate-900 dark:group-hover:text-white transition-colors" id="total-${type}-${denom}">₹0</span>
                    </div>
                `;
                container.appendChild(row);
            });
        }

        function calculate() {
            let grandTotal = 0;
            let totalNotes = 0;
            let totalCoins = 0;

            notes.forEach(denom => {
                const input = document.getElementById(`input-note-${denom}`);
                const totalEl = document.getElementById(`total-note-${denom}`);
                const count = parseInt(input.value) || 0;
                const rowTotal = count * denom;
                
                totalEl.innerText = `₹${rowTotal.toLocaleString('en-IN')}`;
                grandTotal += rowTotal;
                totalNotes += count;
            });

            coins.forEach(denom => {
                const input = document.getElementById(`input-coin-${denom}`);
                const totalEl = document.getElementById(`total-coin-${denom}`);
                const count = parseInt(input.value) || 0;
                const rowTotal = count * denom;
                
                totalEl.innerText = `₹${rowTotal.toLocaleString('en-IN')}`;
                grandTotal += rowTotal;
                totalCoins += count;
            });

            grandTotalEl.innerText = grandTotal.toLocaleString('en-IN');
            totalNotesEl.innerText = totalNotes.toLocaleString('en-IN');
            totalCoinsEl.innerText = totalCoins.toLocaleString('en-IN');
        }

        function resetCalculator() {
            notes.forEach(denom => document.getElementById(`input-note-${denom}`).value = '');
            coins.forEach(denom => document.getElementById(`input-coin-${denom}`).value = '');
            calculate();
        }

        // Initialize Application
        buildUI(notes, 'note', 'notes-container');
        buildUI(coins, 'coin', 'coins-container');
    </script>
</body>
</html>
